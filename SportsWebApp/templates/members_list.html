<!DOCTYPE html>

<!--  this is the list of members page-->

<html lang="en-us">
    <head>
        <meta name="viewport" content="initial-scale=1,width=width-device" />
        <title>List Page</title>
        <link rel="stylesheet" href="/static/css/main.css" />
    </head>
    <body class="light-mode center large" id="dark_mode">
        <h1 class="extralarge center">Search for member:</h1>

        <form class="exlarge" action="/search" method="post">
            <input class="large" placeholder="Name" name="name" type="text" />
            <input type="submit" />
        </form>

        <h1 class="large center">List</h1>

        <table class="large table">
            <thead>
                <tr>
                    <th>Name:</th>
                    <th>Sport:</th>
                </tr>
            </thead>
            <tbody>
                <!-- this is JINJA a language that its used in FLASK  -->
                {% for row in registrants%}
                <tr>
                    <td>{{row[0]}}</td>
                    <td>{{row[1]}}</td>
                </tr>
                {% endfor %}1
            </tbody>
        </table>

        <a class="small" href="/">HOME PAGE</a><br />

        <button class="grey large" onclick="dark_mode();">Dark Mode</button>

        <script>
            function dark_mode() {
                const element = document.getElementById("dark_mode")
                element.classList.toggle("dark-mode") // this will toggle the class light-mode to dark-mode
            }
        </script>
    </body>
</html>
